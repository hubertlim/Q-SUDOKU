name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          for f in index.html style.css sudoku.js app.js; do
            [ -f "$f" ] || { echo "::error::Missing $f"; exit 1; }
          done

      - name: Docker build
        run: docker build -t q-sudoku-test .
