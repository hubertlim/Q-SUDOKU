<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Q-SUDOKU - minimalistic Sudoku puzzle game">
  <meta name="theme-color" content="#0a0a10">
  <title>Q-SUDOKU</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>Q</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <noscript>Q-SUDOKU requires JavaScript to run.</noscript>

  <div id="welcome">
    <div id="welcome-inner">
      <div id="welcome-brand">
        <div id="welcome-logo">Q</div>
        <div id="welcome-title">Q<span class="dim">-</span>SUDOKU</div>
        <div id="welcome-sub">Logic puzzle, zero fluff</div>
      </div>
      <div id="welcome-actions">
        <button id="w-continue" class="w-btn w-primary" hidden>Continue Game</button>
        <button id="w-play" class="w-btn w-primary">New Game</button>
        <button id="w-learn" class="w-btn w-secondary">Learn Sudoku</button>
      </div>
      <div id="welcome-diff">
        <button class="w-diff active" data-diff="easy">Easy</button>
        <button class="w-diff" data-diff="medium">Medium</button>
        <button class="w-diff" data-diff="hard">Hard</button>
      </div>
      <div id="welcome-footer">
        <div id="welcome-themes">
          <button class="theme-dot" data-theme="midnight" title="Midnight" aria-label="Midnight theme"><span style="background:#6c5ce7"></span></button>
          <button class="theme-dot" data-theme="nord" title="Nord" aria-label="Nord theme"><span style="background:#88c0d0"></span></button>
          <button class="theme-dot" data-theme="rose" title="Rose Pine" aria-label="Rose Pine theme"><span style="background:#eb6f92"></span></button>
          <button class="theme-dot" data-theme="paper" title="Paper" aria-label="Paper theme"><span style="background:#d4c5a9"></span></button>
        </div>
        <div id="welcome-stats"></div>
      </div>
    </div>
  </div>

  <main id="app" hidden>
    <header id="topbar">
      <h1>Q<span class="dim">-</span>SUDOKU</h1>
      <div id="topbar-right">
        <div id="theme-picker" aria-label="Theme selection">
          <button class="theme-dot" data-theme="midnight" title="Midnight" aria-label="Midnight theme"><span style="background:#6c5ce7"></span></button>
          <button class="theme-dot" data-theme="nord" title="Nord" aria-label="Nord theme"><span style="background:#88c0d0"></span></button>
          <button class="theme-dot" data-theme="rose" title="Rose Pine" aria-label="Rose Pine theme"><span style="background:#eb6f92"></span></button>
          <button class="theme-dot" data-theme="paper" title="Paper" aria-label="Paper theme"><span style="background:#d4c5a9"></span></button>
        </div>
        <div id="timer-wrap">
          <time id="timer" aria-live="off" aria-label="Elapsed time">00:00</time>
          <button id="btn-pause" aria-label="Pause game" title="Pause">&#9208;</button>
        </div>
      </div>
    </header>
    <div id="game">
      <div id="board-wrap">
        <div id="board" role="grid" aria-label="Sudoku board"></div>
        <div id="pause-overlay" hidden>
          <span>PAUSED</span>
          <button id="btn-resume">Resume</button>
        </div>
      </div>
      <aside id="sidebar">
        <div id="challenge-bar">
          <span class="ch-info" id="ch-bar-info"></span>
          <button class="ch-tip-btn" id="ch-bar-support">Modelled</button>
          <button class="ch-tip-btn" id="ch-bar-tip">Tip</button>
        </div>
        <div id="score-bar">
          <span id="score-label">Score</span>
          <span id="score-value">0</span>
        </div>
        <div id="streak-bar">
          <span id="streak-label">Streak &#128293;</span>
          <span id="streak-value">0</span>
        </div>
        <nav id="controls" aria-label="Difficulty selection">
          <button class="diff-btn" data-diff="learn">Learn</button>
          <button class="diff-btn active" data-diff="easy">Easy</button>
          <button class="diff-btn" data-diff="medium">Medium</button>
          <button class="diff-btn" data-diff="hard">Hard</button>
        </nav>
        <div id="numpad" aria-label="Number input">
          <button class="num-btn" data-num="1">1</button>
          <button class="num-btn" data-num="2">2</button>
          <button class="num-btn" data-num="3">3</button>
          <button class="num-btn" data-num="4">4</button>
          <button class="num-btn" data-num="5">5</button>
          <button class="num-btn" data-num="6">6</button>
          <button class="num-btn" data-num="7">7</button>
          <button class="num-btn" data-num="8">8</button>
          <button class="num-btn" data-num="9">9</button>
          <button class="num-btn erase" data-num="0" aria-label="Erase">&#10005;</button>
        </div>
        <div id="actions">
          <button id="btn-new">New</button>
          <button id="btn-check">Check</button>
          <button id="btn-hint">Hint <span id="hint-count"></span></button>
          <button id="btn-solve">Solve</button>
        </div>
        <div id="best-scores">
          <span class="best" data-diff="easy">E: -</span>
          <span class="best" data-diff="medium">M: -</span>
          <span class="best" data-diff="hard">H: -</span>
        </div>
      </aside>
    </div>
    <div id="message" role="status" aria-live="polite"></div>
    <div id="challenge-done" hidden>
      <button id="done-next" class="learn-btn learn-btn-primary">Next Challenge &rarr;</button>
      <button id="done-list" class="learn-btn">All Challenges</button>
    </div>
    <div id="confirm-bar" hidden>
      <span id="confirm-text"></span>
      <button id="confirm-yes">Yes</button>
      <button id="confirm-no">Cancel</button>
    </div>

    <div id="learn-overlay" hidden>
      <div id="learn-panel">
        <div id="learn-header">
          <h2>Learn Sudoku</h2>
          <span id="learn-stars-total">Stars 0 / 36</span>
          <button id="learn-close" aria-label="Close">&#10005;</button>
        </div>
        <div id="learn-stages"></div>
        <div id="learn-lesson" hidden>
          <div id="lesson-badge"></div>
          <h3 id="lesson-title"></h3>
          <p id="lesson-desc"></p>
          <div class="lesson-grid">
            <div class="lesson-block">
              <span class="lesson-label">Why It Matters</span>
              <p id="lesson-why"></p>
            </div>
            <div class="lesson-block">
              <span class="lesson-label">What To Look For</span>
              <p id="lesson-look"></p>
            </div>
            <div class="lesson-block">
              <span class="lesson-label">Practice Goal</span>
              <p id="lesson-practice"></p>
            </div>
            <div class="lesson-block">
              <span class="lesson-label">Starting Support</span>
              <p id="lesson-support"></p>
            </div>
          </div>
          <p id="lesson-tip" class="tip"></p>
          <div id="lesson-actions">
            <button id="lesson-back" class="learn-btn">&larr; Back</button>
            <button id="lesson-start" class="learn-btn learn-btn-primary">Start Challenge</button>
          </div>
        </div>
        <div id="learn-complete" hidden>
          <div id="complete-stars"></div>
          <h3 id="complete-title"></h3>
          <p id="complete-msg"></p>
          <div id="complete-actions">
            <button id="complete-back" class="learn-btn">All Challenges</button>
            <button id="complete-next" class="learn-btn learn-btn-primary">Next &rarr;</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
