<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Q-SUDOKU — minimalistic sudoku puzzle game">
  <meta name="theme-color" content="#0a0a10">
  <title>Q-SUDOKU</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧩</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <noscript>Q-SUDOKU requires JavaScript to run.</noscript>
  <main id="app">
    <header id="topbar">
      <h1>Q<span class="dim">-</span>SUDOKU</h1>
      <div id="topbar-right">
        <div id="theme-picker" aria-label="Theme selection">
          <button class="theme-dot" data-theme="midnight" title="Midnight" aria-label="Midnight theme"><span style="background:#6c5ce7"></span></button>
          <button class="theme-dot" data-theme="nord" title="Nord" aria-label="Nord theme"><span style="background:#88c0d0"></span></button>
          <button class="theme-dot" data-theme="rose" title="Rosé Pine" aria-label="Rosé Pine theme"><span style="background:#eb6f92"></span></button>
          <button class="theme-dot" data-theme="paper" title="Paper" aria-label="Paper theme"><span style="background:#d4c5a9"></span></button>
        </div>
        <div id="timer-wrap">
          <time id="timer" aria-live="off" aria-label="Elapsed time">00:00</time>
          <button id="btn-pause" aria-label="Pause game" title="Pause">⏸</button>
        </div>
      </div>
    </header>
    <div id="game">
      <div id="board-wrap">
        <div id="board" role="grid" aria-label="Sudoku board"></div>
        <div id="pause-overlay" hidden>
          <span>PAUSED</span>
          <button id="btn-resume">Resume</button>
        </div>
      </div>
      <aside id="sidebar">
        <div id="score-bar">
          <span id="score-label">Score</span>
          <span id="score-value">0</span>
        </div>
        <div id="streak-bar">
          <span id="streak-label">Streak 🔥</span>
          <span id="streak-value">0</span>
        </div>
        <nav id="controls" aria-label="Difficulty selection">
          <button class="diff-btn" data-diff="learn">Learn</button>
          <button class="diff-btn active" data-diff="easy">Easy</button>
          <button class="diff-btn" data-diff="medium">Medium</button>
          <button class="diff-btn" data-diff="hard">Hard</button>
        </nav>
        <div id="numpad" aria-label="Number input">
          <button class="num-btn" data-num="1">1</button>
          <button class="num-btn" data-num="2">2</button>
          <button class="num-btn" data-num="3">3</button>
          <button class="num-btn" data-num="4">4</button>
          <button class="num-btn" data-num="5">5</button>
          <button class="num-btn" data-num="6">6</button>
          <button class="num-btn" data-num="7">7</button>
          <button class="num-btn" data-num="8">8</button>
          <button class="num-btn" data-num="9">9</button>
          <button class="num-btn erase" data-num="0" aria-label="Erase">✕</button>
        </div>
        <div id="actions">
          <button id="btn-new">New</button>
          <button id="btn-check">Check</button>
          <button id="btn-hint">Hint <span id="hint-count"></span></button>
          <button id="btn-solve">Solve</button>
        </div>
        <div id="best-scores">
          <span class="best" data-diff="learn">L: —</span>
          <span class="best" data-diff="easy">E: —</span>
          <span class="best" data-diff="medium">M: —</span>
          <span class="best" data-diff="hard">H: —</span>
        </div>
      </aside>
    </div>
    <div id="message" role="status" aria-live="polite"></div>
  </main>
  <script src="sudoku.js"></script>
  <script src="app.js"></script>
</body>
</html>
